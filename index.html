<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanaullah | Google Automation Expert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--yellow:#f59e0b;
--text:#f8fafc;
}

html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial;overflow-x:hidden;}

nav{
position:fixed;top:0;width:100%;
padding:15px 10%;
background:rgba(15,23,42,0.6);
backdrop-filter:blur(12px);
z-index:1000;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

h1{font-size:48px;}
span{color:var(--yellow);}

section{padding:70px 10%;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:15px;
transition:0.3s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(245,158,11,0.2);
}

.btn{
display:inline-block;
padding:12px 25px;
background:var(--yellow);
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
border:none;
cursor:pointer;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

#msg{margin-top:10px;color:#25d366;}
</style>
</head>

<body>

<nav>
<b>Sanaullah<span>.</span></b>
</nav>

<div class="hero">
<div>
<h1>Sanaullah <span>Google Automation</span></h1>
<p>Google Sheets | Forms | WhatsApp Automation</p>
<a href="#contact" class="btn">Contact Me</a>
</div>
</div>

<section>
<h2>My Services</h2>
<div class="grid">

<div class="card">
<i class="fa fa-file"></i>
<h3>Google Forms Automation</h3>
</div>

<div class="card">
<i class="fa fa-table"></i>
<h3>Google Sheets Dashboard</h3>
</div>

<div class="card">
<i class="fa fa-whatsapp"></i>
<h3>WhatsApp Integration</h3>
</div>

</div>
</section>

<section id="contact">
<h2>Contact Me</h2>

<form id="form">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="phone" placeholder="Phone">
<textarea name="message" placeholder="Message" required></textarea>
<button class="btn" type="submit">Send Message</button>
</form>

<div id="msg"></div>
</section>

<script>

// particles (same premium effect)
particlesJS("particles-js",{
particles:{
number:{value:50},
color:{value:"#f59e0b"},
line_linked:{enable:true,color:"#f59e0b"}
}
});

// FORM → GOOGLE SHEET + EMAIL
document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

let data={
name:this.name.value,
email:this.email.value,
phone:this.phone.value,
message:this.message.value
};

fetch("PASTE_YOUR_GOOGLE_SCRIPT_URL",{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>{
document.getElementById("msg").innerText="Message Sent Successfully!";
this.reset();
})
.catch(()=>{
document.getElementById("msg").innerText="Error Sending Message";
});

});

</script>

</body>
</html>
