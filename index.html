<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanaullah | Google Automation Expert</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    
    <!-- زبان کا ڈیٹا یہاں لوڈ ہوگا -->
    <script src="languages.js"></script>
</head>
<body>

    <!-- ====== 1. HERO SECTION ====== -->
    <section class="hero">
        <div class="dp-wrapper">
            <img src="https://raw.githubusercontent.com/sanaullamastoi548-maker/automation-website/main/20260530_215907.png" alt="Sanaullah" />
        </div>
        <h1 data-i18n="title">Sanaullah | Google Automation</h1>
        <p data-i18n="hero">I help schools and businesses save time with Google Apps Script Automation.</p>
    </section>

    <!-- زبان تبدیل کرنے والے بٹن -->
    <div class="language-switcher">
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('ur')">اردو</button>
        <button onclick="changeLanguage('ar')">العربية</button>
        <button onclick="changeLanguage('fr')">Français</button>
        <button onclick="changeLanguage('tr')">Türkçe</button>
    </div>

    <!-- ====== 2. دو ٹولز (سائیڈ بائی سائیڈ) ====== -->
    <div class="tools-grid">
        <div class="tool-item">
            <h2>🧪 Automation Lab</h2>
            <h3>AUTO-000 | System Health Check</h3>
            <button onclick="runHealthTest()">Run Test</button>
            <div id="healthResult" class="tool-result-box">Waiting for Test...</div>
        </div>

        <div class="tool-item">
            <h2>🚀 Automation Lab</h2>
            <h3>AUTO-001 | Smart Contact Form Tester</h3>
            <form id="testForm">
                <input type="text" id="testName" placeholder="Your Name" required>
                <input type="email" id="testEmail" placeholder="Your Email" required>
                <input type="text" id="testPhone" placeholder="WhatsApp Number" required>
                <textarea id="testMessage" placeholder="Your Message" required></textarea>
                <button type="submit">Send Test</button>
            </form>
            <div id="testResult" class="tool-result-box">Waiting...</div>
        </div>
    </div>

    <!-- باقی حصہ وہی ہے جو آپ کا پہلے سے بہترین ہے -->
    <!-- (یہاں پورٹ فولیو، ویڈیو اور دیگر سیکشنز اپنی جگہ برقرار رہیں گے) -->

    <script src="script.js"></script>
</body>
</html>
