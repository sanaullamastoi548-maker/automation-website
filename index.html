<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWFR7FWDW4"></script> 
    <script> 
      window.dataLayer = window.dataLayer || []; 
      function gtag(){dataLayer.push(arguments);} 
      gtag('js', new Date()); 
      gtag('config', 'G-NWFR7FWDW4'); 
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanaullah | Google Automation Expert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --primary-yellow: #f59e0b; --text-white: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-white); margin: 0; font-family: sans-serif; }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .form-control { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; background: #1e293b; color: white; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary-yellow); font-weight: bold; cursor: pointer; color: #000; }
        .btn-link { padding: 12px 20px; border-radius: 50px; text-decoration: none; color: white; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; margin: 5px; }
    </style>
</head>
<body>

    <section style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
    
    <div style="width: 220px; height: 220px; border: 5px solid #f59e0b; border-radius: 50%; overflow: hidden; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
    <img src="20260530_215907.png?v=2" alt="Sanaullah" style="width: 100%; height: 100%; object-fit: cover;">

</div>

    
    <div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Sanaullah <span style="color:var(--primary-yellow)">Google Automation</span></h1>
        <p style="font-size: 1.2rem; color: #94a3b8;">Helping Schools and Businesses automate workflows.</p>
    </div>
</section>

    <section id="services" style="padding: 4rem 10%;">
        <h2 style="text-align: center;">My <span style="color:var(--primary-yellow)">Services</span></h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 2rem;">
            <div class="card"><h3>Forms Automation</h3></div>
            <div class="card"><h3>Sheets Dashboard</h3></div>
            <div class="card"><h3>WhatsApp Integration</h3></div>
        </div>
    </section>

    <section id="contact" style="padding: 4rem 10%; max-width: 600px; margin: auto;">
        <h2 style="text-align: center;">Get In <span style="color:#f59e0b;">Touch</span></h2>
        
        <form id="contactForm" style="background: #151f32; padding: 30px; border-radius: 20px;">
            <input type="text" name="Name" placeholder="Your Name" required class="form-control">
            <input type="email" name="Email" placeholder="Your Email" required class="form-control">
            <textarea name="Message" placeholder="How can I help you?" rows="4" required class="form-control"></textarea>
            <button type="submit" id="submitBtn" class="btn-submit">Send Message</button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="https://www.fiverr.com/s/kLqKwqN" class="btn-link" style="background: #1dbf73;">Order on Fiverr</a>
            <a href="https://wa.me/923043597308" class="btn-link" style="background: #25d366;">WhatsApp</a>
            <a href="mailto:sanaullamastoi548@gmail.com" class="btn-link" style="background: var(--primary-yellow); color: #000;">Email Me</a>
        </div>
    </section>

    <div id="particles-js" style="position: fixed; width: 100%; height: 100%; top: 0; z-index: -1;"></div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {"value": 40}, 
                "color": {"value": "#f59e0b"}, 
                "line_linked": {"enable": true, "color": "#f59e0b", "opacity": 0.2}
            }
        });
        
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyb8XB_p_I5dMZfba5uHHgw22DrQRCUxULKgQjUSQn1CslnYHmAUQij0siuw6V_RAG1YA/exec';
        const form = document.getElementById('contactForm');
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').innerText = "Sending...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => { 
                    alert("آپ کا پیغام کامیابی سے موصول ہو گیا ہے!\nYour message has been received successfully!"); 
                    form.reset(); 
                    document.getElementById('submitBtn').innerText = "Send Message"; 
                })
                .catch(error => {
                    alert("معذرت، کوئی مسئلہ پیش آیا۔\nSorry, something went wrong.");
                    document.getElementById('submitBtn').innerText = "Send Message";
                });
        });
    </script>
</body>
</html>
