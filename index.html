<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanaullah | Google Automation Expert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root { --bg-dark: #0f172a; --primary-yellow: #f59e0b; --text-white: #f8fafc; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; margin: 0; padding: 0; }
        #progressBar { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: var(--primary-yellow); z-index: 10000; }
        nav { position: fixed; top: 0; width: 100%; padding: 1.5rem 10%; z-index: 1000; transition: all 0.4s ease; }
        nav.scrolled { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); }
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .form-control { padding: 15px; border-radius: 10px; border: none; background: #1e293b; color: white; width: 100%; margin-bottom: 15px; }
        .btn-submit { padding: 15px; border-radius: 10px; border: none; background: var(--primary-yellow); font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div id="progressBar"></div>
    <nav id="navbar"><a href="#" style="color:white; font-size: 1.5rem; text-decoration: none; font-weight: 700;">Sanaullah<span>.</span></a></nav>
    <div id="particles-js" style="position: fixed; width: 100%; height: 100%; z-index: -1;"></div>

    <section style="height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div>
            <h1>Sanaullah <span style="color:#f59e0b">Google Automation</span></h1>
            <p>Helping businesses automate workflows.</p>
        </div>
    </section>

    <section id="contact" style="padding: 50px 10%; max-width: 600px; margin: auto;">
        <form id="contactForm" style="background: #151f32; padding: 30px; border-radius: 20px; position: relative; z-index: 9999;">
            <input type="text" name="Name" placeholder="Your Name" required class="form-control">
            <input type="email" name="Email" placeholder="Your Email" required class="form-control">
            <textarea name="Message" placeholder="Message" rows="5" required class="form-control"></textarea>
            <button type="submit" id="submitBtn" class="btn-submit">Send Message</button>
        </form>
    </section>

    <script>
        window.addEventListener("scroll", () => {
            document.getElementById("progressBar").style.width = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100 + "%";
        });
        particlesJS("particles-js", {"particles": {"number": {"value": 40}, "color": {"value": "#f59e0b"}, "line_linked": {"enable": true, "color": "#f59e0b", "opacity": 0.2}}});

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyDSiYPdF3HM-ZklzVbLz-8_j197HfNVlGzp4IzO5pycUSPGdSpDWEhZUy1AIXi3jGz/exec';
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending...";
            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(() => { alert("Success!"); form.reset(); btn.innerText = "Send Message"; })
                .catch(err => { console.error(err); btn.innerText = "Send Message"; });
        });
    </script>
</body>
</html>
