<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanaullah | Google Automation Expert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --primary-yellow: #f59e0b; --text-white: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-white); margin: 0; font-family: sans-serif; }
        
        /* Particles Background */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        .card { background: #1e293b; padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; margin: 10px; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .tool-item { background: #1e293b; padding: 20px; border-radius: 20px; border: 2px solid var(--primary-yellow); text-align: center; }
        .tool-result-box { background: #0f172a; padding: 15px; margin-top: 10px; border-radius: 10px; min-height: 50px; }
        
        button { padding: 10px 20px; border-radius: 10px; border: none; background: var(--primary-yellow); font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>

<!-- Particles Div -->
<div id="particles-js"></div>

<!-- Hero Section -->
<section style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
    <div style="width: 220px; height: 220px; border: 5px solid #f59e0b; border-radius: 50%; overflow: hidden; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
        <img src="https://raw.githubusercontent.com/sanaullamastoi548-maker/automation-website/main/20260530_215907.png" alt="Sanaullah" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <h1>Sanaullah <span style="color:var(--primary-yellow)">Google Automation</span></h1>
    <p>I help schools and businesses save time with Google Apps Script Automation.</p>
</section>

<!-- Tools -->
<div class="tools-grid">
    <div class="tool-item">
        <h2>🧪 Automation Lab</h2>
        <h3>AUTO-000 | System Health Check</h3>
        <button onclick="runHealthTest()">Run Test</button>
        <div id="healthResult" class="tool-result-box">Waiting for Test...</div>
    </div>
    <div class="tool-item">
        <h2>🚀 Automation Lab</h2>
        <h3>AUTO-001 | Form Tester</h3>
        <form id="testForm">
            <input type="text" id="testName" placeholder="Your Name" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px;">
            <button type="submit">Send Test</button>
        </form>
        <div id="testResult" class="tool-result-box">Waiting...</div>
    </div>
</div>

<script>
    // Particles Configuration
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 50 },
            "color": { "value": "#f59e0b" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#f59e0b", "opacity": 0.4 }
        }
    });

    // Tools Logic
    window.runHealthTest = function() { document.getElementById("healthResult").innerHTML = "✅ System Working Successfully"; };
    document.getElementById("testForm").addEventListener("submit", function(e) { e.preventDefault(); document.getElementById("testResult").innerHTML = "✅ Test Successful for " + document.getElementById("testName").value; });
</script>

</body>
</html>
