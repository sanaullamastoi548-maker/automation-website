<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanaullah | Google Automation Expert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
:root{
--bg-dark:#0f172a;
--primary:#f59e0b;
--text:#f8fafc;
}

html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg-dark);color:var(--text);font-family:Arial;overflow-x:hidden;}

#progress{position:fixed;top:0;left:0;height:3px;background:var(--primary);width:0%;z-index:9999;}

nav{
position:fixed;top:0;width:100%;
padding:15px 10%;
backdrop-filter:blur(10px);
background:rgba(15,23,42,0.6);
z-index:1000;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

h1{font-size:45px;}
span{color:var(--primary);}

section{padding:70px 10%;}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(245,158,11,0.3);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:var(--primary);
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div id="progress"></div>

<nav>
<b>Sanaullah<span>.</span></b>
</nav>

<div id="particles-js"></div>

<div class="hero">
<div>
<h1>Sanaullah <span>Automation</span></h1>
<p>Google Sheets | Forms | WhatsApp Automation</p>
<a href="#contact" class="btn">Contact Me</a>
</div>
</div>

<section>
<h2>My Services</h2>
<div class="grid">

<div class="card">
<i class="fa fa-file"></i>
<h3>Google Forms Automation</h3>
</div>

<div class="card">
<i class="fa fa-table"></i>
<h3>Google Sheets Dashboard</h3>
</div>

<div class="card">
<i class="fa fa-whatsapp"></i>
<h3>WhatsApp Integration</h3>
</div>

</div>
</section>

<section id="contact">
<h2>Contact Me</h2>

<form id="form">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<input type="text" name="phone" placeholder="Phone">
<textarea name="message" placeholder="Message" required></textarea>
<button class="btn" type="submit">Send</button>
</form>

<p id="msg"></p>
</section>

<script>

// Progress bar
window.addEventListener("scroll",()=>{
let h=document.documentElement;
let scrolled=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;
document.getElementById("progress").style.width=scrolled+"%";
});

// Particle
particlesJS("particles-js",{
particles:{
number:{value:50},
color:{value:"#f59e0b"},
line_linked:{enable:true,color:"#f59e0b"}
}
});

// FORM SUBMIT TO GOOGLE SHEET
document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

let data={
name:this.name.value,
email:this.email.value,
phone:this.phone.value,
message:this.message.value
};

fetch("PASTE_YOUR_APPS_SCRIPT_URL_HERE",{
method:"POST",
body:JSON.stringify(data)
})
.then(()=> {
document.getElementById("msg").innerText="Message Sent Successfully!";
this.reset();
})
.catch(()=> {
document.getElementById("msg").innerText="Error!";
});

});

</script>

</body>
</html>
